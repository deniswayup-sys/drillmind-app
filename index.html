<!DOCTYPE html>
<html>
<head>
  <title>DrillMind Login</title>
</head>
<body>

<h2>Login DrillMind</h2>

<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="password" placeholder="Senha"><br><br>

<button onclick="login()">Entrar</button>

<p id="status"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "COLE_AQUI_SUA_URL",
  "COLE_AQUI_SUA_ANON_KEY"
);

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("status").innerText = "Erro: " + error.message;
  } else {
    document.getElementById("status").innerText = "Login realizado!";
  }
}
</script>

</body>
</html>
